<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignKit Avatar</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0f1620;
      }

      #avatar-root {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: radial-gradient(circle at 50% 22%, #152335 0%, #0b1118 58%, #080c12 100%);
      }

      canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }
    </style>
  </head>
  <body>
    <div id="avatar-root"></div>
    <script src="./vendor/three.min.js"></script>
    <script src="./vendor/GLTFLoader.legacy.js"></script>
    <script src="./signkit-bundle.js"></script>
  </body>
  </html>
